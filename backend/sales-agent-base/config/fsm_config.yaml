# ============================================================
# CONFIGURACIÓN DE LA MÁQUINA DE ESTADOS (FSM)
# ============================================================
# Versión: 2.0.0
# Descripción: Configuración centralizada para el agente de ventas
# ============================================================

version: "2.0.0"

# ============================================================
# CONFIGURACIÓN GENERAL
# ============================================================

general:
  # Tiempo máximo de inactividad de categoría (segundos)
  category_timeout: 300

  # Longitud máxima de respuesta (caracteres)
  max_response_length: 180

  # Todas las respuestas deben terminar con pregunta
  must_end_with_question: true

# ============================================================
# LÍMITES DE INTENTOS
# ============================================================

limits:
  max_upsell_attempts: 2
  max_crosssell_attempts: 1
  max_clarification_attempts: 2

# ============================================================
# MAPEO DE CATEGORÍAS
# ============================================================
# Términos que el usuario puede decir → Nombre en el menú

category_mapping:
  # Hamburguesas
  hamburguesa: "Hamburguesas"
  hamburguesas: "Hamburguesas"
  burger: "Hamburguesas"
  burgers: "Hamburguesas"

  # Tacos
  taco: "Tacos"
  tacos: "Tacos"
  taquito: "Tacos"
  taquitos: "Tacos"

  # Bebidas
  bebida: "Bebidas"
  bebidas: "Bebidas"
  refresco: "Bebidas"
  refrescos: "Bebidas"
  tomar: "Bebidas"
  agua: "Bebidas"

  # Postres
  postre: "Postres"
  postres: "Postres"
  dulce: "Postres"
  dulces: "Postres"

  # Entradas
  entrada: "Entradas"
  entradas: "Entradas"
  botana: "Entradas"
  botanas: "Entradas"

  # Sopas
  sopa: "Sopas"
  sopas: "Sopas"
  caldo: "Sopas"
  caldos: "Sopas"

  # Ensaladas
  ensalada: "Ensaladas"
  ensaladas: "Ensaladas"

  # Complementos
  complemento: "Complementos"
  complementos: "Complementos"
  papas: "Complementos"
  extra: "Complementos"
  extras: "Complementos"

  # Platos Fuertes
  plato fuerte: "Platos Fuertes"
  platos fuertes: "Platos Fuertes"
  platillo: "Platos Fuertes"
  platillos: "Platos Fuertes"

# ============================================================
# DETECCIÓN DE PRODUCTOS
# ============================================================

product_detection:
  # Palabras a ignorar al detectar productos específicos
  ignore_words:
    - "taco"
    - "tacos"
    - "hamburguesa"
    - "hamburguesas"
    - "agua"
    - "de"
    - "los"
    - "las"
    - "el"
    - "la"
    - "me"
    - "recomiendas"
    - "recomienda"
    - "quiero"
    - "dame"

  # Longitud mínima de palabra clave para considerar
  min_keyword_length: 4

# ============================================================
# REGLAS DE MICRO-EMBUDO
# ============================================================

micro_funnel:
  # Triggers que mantienen al usuario en el micro-embudo
  stay_triggers:
    - "cuál me recomiendas"
    - "cuál es mejor"
    - "cuál es el más rico"
    - "qué me sugieres"
    - "cuál es tu favorito"
    - "cuál pido"
    - "qué tiene"
    - "es picante"
    - "qué ingredientes tiene"
    - "cuánto cuesta"
    - "cuál es más grande"
    - "recomiéndame"
    - "sugiéreme"
    - "no sé cuál"
    - "ayúdame a elegir"

  # Triggers que sacan al usuario del micro-embudo
  exit_triggers:
    - "eso es todo"
    - "ya"
    - "nada más"
    - "es todo"
    - "solo eso"
    - "confirma"
    - "cierra"
    - "termina"

  # Triggers que cambian de categoría
  switch_triggers:
    - "y de"
    - "ahora quiero"
    - "también quiero"
    - "qué tienen de"
    - "dame"

# ============================================================
# ESTRATEGIA DE UPSELL
# ============================================================

upsell:
  # Secuencia de ofertas
  sequence:
    - type: "upgrade"
      condition: "producto_basico_seleccionado"
      template: "Por solo ${price_diff} más {upgrade}. ¿Le entramos?"

    - type: "combo"
      condition: "sin_complementos"
      template: "Como combo con {items} AHORRAS ${savings}. ¿Lo armamos?"

    - type: "extra"
      condition: "producto_confirmado"
      template: "¿Le ponemos {extra}? {benefit}, solo ${price}."

  # Ofertas por categoría
  by_category:
    hamburguesas:
      upgrade:
        product: "Hamburguesa Doble"
        price_diff: 40
        description: "la hacemos DOBLE CARNE"
      combo:
        items: ["Papas Fritas", "Bebida"]
        savings: 25
      extras:
        - name: "Tocino crujiente"
          price: 15
        - name: "Queso extra"
          price: 10

    tacos:
      upgrade:
        type: "quantity"
        description: "hacemos 4 en vez de 3"
        price_diff: 20
      combo:
        items: ["Agua de limón"]
        savings: 10
      extras:
        - name: "Queso gratinado"
          price: 10
        - name: "Cebollitas asadas"
          price: 8

  # Alternativa cuando rechaza
  alternative:
    template: "¿Y solo {alternative}? {description}, ${price}."
    options:
      - alternative: "las papas"
        description: "Crujientes y recién hechas"
        price: 35
      - alternative: "una bebida"
        description: "Para acompañar"
        price: 20

# ============================================================
# ESTRATEGIA DE CROSS-SELL
# ============================================================

cross_sell:
  # Matriz de cross-sell: qué ofrecer según lo que tiene
  matrix:
    has_main_no_beverage:
      offer: "beverage"
      product: "Agua de limón"
      template: "¿Y de tomar? {product} está recién hecha. Solo ${price}."
      price: 20

    has_main_no_side:
      offer: "side"
      product: "Papas Fritas"
      template: "¿Lo acompañas con {product}? Quedan perfectas. ${price}."
      price: 35

    has_everything:
      offer: "dessert"
      product: "Flan Napolitano"
      template: "¿Dejamos espacio para el postre? {product} está buenísimo."
      price: 45

# ============================================================
# PLANTILLAS DE RESPUESTA
# ============================================================

response_templates:
  # Bienvenida
  greeting:
    templates:
      - "¡Hola! {featured_product} está {state}. ¿Te {action}?"
      - "¡Bienvenido! Hoy {featured_product} {state}. ¿Qué se te antoja?"
    variables:
      state: ["volando", "increíble", "recién hecho", "de los favoritos"]
      action: ["preparo uno", "cuento", "lo pongo"]

  # Listar categoría
  list_category:
    templates:
      - "¡{star_product} es {adjective}! También tenemos {other_products}. ¿{closing}?"
    variables:
      adjective: ["el favorito", "el campeón", "el más pedido", "increíble"]
      closing: ["Cuántos te pongo", "Cuál te preparo", "Te lo preparo"]

  # Recomendación
  recommend:
    popular:
      - "¡Te recomiendo {product}! {reason}. ¿Te {action}?"
      - "¡{product} sin duda! {reason}. ¿{closing}?"
    mentioned:
      - "¡{product} está {adjective}! {reason}. ¿{closing}?"
      - "¡Buena elección! {product} {reason}. ¿Te {action}?"
    variables:
      reason: ["Es el más pedido", "Es de los favoritos", "Está volando", "No te arrepentirás"]
      adjective: ["increíble", "buenísimo", "delicioso", "espectacular"]
      action: ["lo preparo", "los pongo", "la preparo"]
      closing: ["Te lo preparo", "Cuántos van", "Lo pongo"]

  # Confirmación
  confirmation:
    summary:
      - "¡{celebration}! Llevas {summary}. Total: ${total}. ¿{last_chance}?"
    final:
      - "¡Perfecto! Son ${total} pesos. {time_estimate}."
    variables:
      celebration: ["Excelente pedido", "Tremendo pedido", "Buenísima elección"]
      time_estimate: ["En 10 minutitos lo tienes", "En unos minutos está listo"]
      last_chance: ["Agregamos algo más", "Todo bien"]

  # Cierre
  closing:
    templates:
      - "¡{celebration}! {anticipation}. ¡Que lo disfrutes!"
    variables:
      celebration: ["Tremendo pedido", "Excelente elección", "Gran pedido"]
      anticipation: ["Te va a encantar", "Es de lo mejor", "Vas a quedar satisfecho"]

# ============================================================
# MÉTRICAS OBJETIVO
# ============================================================

metrics:
  targets:
    upsell_acceptance_rate: 0.65  # 65%
    combo_conversion_rate: 0.55   # 55%
    beverage_attachment_rate: 0.80  # 80%
    items_per_order: 3.5
    ticket_increase: 0.30  # 30%

# ============================================================
# VALIDACIONES
# ============================================================

validations:
  # Verificar que la respuesta termina con pregunta
  check_ends_with_question: true

  # Verificar que no menciona productos inexistentes
  check_valid_products: true

  # Verificar longitud máxima
  check_max_length: true

  # Verificar coherencia de contexto
  check_context_coherence: true
