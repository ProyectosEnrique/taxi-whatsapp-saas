# ============================================================
# INFORMACIÓN DE PORCIONES POR PRODUCTO
# ============================================================
# Este archivo define cuántas piezas trae cada orden y el
# precio por pieza extra para upselling inteligente
# ============================================================

# Configuración por tipo de producto (búsqueda por nombre parcial)
portions:

  # ----------------------------------------------------------
  # TACOS
  # ----------------------------------------------------------
  tacos:
    keywords: ["taco", "tacos"]
    default_quantity: 5
    unit_name: "tacos"
    unit_name_singular: "taco"
    price_per_extra: 22
    min_quantity: 3
    max_quantity: 15
    upsell_suggestion: 8
    sales_pitch: "La orden trae {qty} {unit} por ${price}. Por solo ${extra_price} más te pongo {upsell_qty}, ¿le entramos?"

  # ----------------------------------------------------------
  # ENCHILADAS
  # ----------------------------------------------------------
  enchiladas:
    keywords: ["enchilada", "enchiladas", "suizas", "verdes", "rojas"]
    default_quantity: 3
    unit_name: "enchiladas"
    unit_name_singular: "enchilada"
    price_per_extra: 35
    min_quantity: 2
    max_quantity: 6
    upsell_suggestion: 4
    sales_pitch: "La orden trae {qty} {unit} por ${price}. ¿Quieres una extra por solo ${extra_price}?"

  # ----------------------------------------------------------
  # ALITAS
  # ----------------------------------------------------------
  alitas:
    keywords: ["alita", "alitas", "wings", "búfalo", "buffalo"]
    default_quantity: 10
    unit_name: "alitas"
    unit_name_singular: "alita"
    price_per_extra: 12
    min_quantity: 5
    max_quantity: 30
    upsell_suggestion: 15
    sales_pitch: "La orden trae {qty} {unit} por ${price}. Por ${extra_total} más te doy {extra_qty} extra, quedan {upsell_qty} en total. ¿Va?"

  # ----------------------------------------------------------
  # QUESADILLAS
  # ----------------------------------------------------------
  quesadillas:
    keywords: ["quesadilla", "quesadillas"]
    default_quantity: 2
    unit_name: "quesadillas"
    unit_name_singular: "quesadilla"
    price_per_extra: 40
    min_quantity: 1
    max_quantity: 6
    upsell_suggestion: 3
    sales_pitch: "La orden trae {qty} {unit} por ${price}. Una extra son ${extra_price}. ¿Le ponemos?"

  # ----------------------------------------------------------
  # NACHOS
  # ----------------------------------------------------------
  nachos:
    keywords: ["nacho", "nachos"]
    default_quantity: 1
    unit_name: "porción"
    unit_name_singular: "porción"
    price_per_extra: 0
    min_quantity: 1
    max_quantity: 3
    upsell_suggestion: 2
    sales_pitch: "Los nachos son una porción generosa para compartir por ${price}. ¿Te los preparo?"
    is_shareable: true

  # ----------------------------------------------------------
  # HAMBURGUESAS
  # ----------------------------------------------------------
  hamburguesas:
    keywords: ["hamburguesa", "burger", "hamburguesas"]
    default_quantity: 1
    unit_name: "hamburguesa"
    unit_name_singular: "hamburguesa"
    price_per_extra: 0
    min_quantity: 1
    max_quantity: 5
    upsell_suggestion: 1
    sales_pitch: "La hamburguesa viene con papas por ${price}. ¿Te la preparo?"
    has_upgrade: true
    upgrade_name: "doble carne"
    upgrade_price: 40

  # ----------------------------------------------------------
  # GUACAMOLE
  # ----------------------------------------------------------
  guacamole:
    keywords: ["guacamole", "guac"]
    default_quantity: 1
    unit_name: "porción"
    unit_name_singular: "porción"
    price_per_extra: 0
    min_quantity: 1
    max_quantity: 3
    upsell_suggestion: 1
    sales_pitch: "El guacamole viene con totopos por ${price}. Perfecto para compartir. ¿Lo preparo?"
    is_shareable: true

# ----------------------------------------------------------
# CONFIGURACIÓN DE RESPUESTAS
# ----------------------------------------------------------
responses:
  # Cuando preguntan cuánto trae
  quantity_question:
    with_extra: "La orden de {product} trae {qty} {unit} por ${price}. Si quieres más, cada {unit_singular} extra son ${extra_price}. ¿Cuántos te pongo?"
    without_extra: "La orden de {product} trae {qty} {unit} por ${price}. ¿Te la preparo?"
    shareable: "{product} es una porción generosa para compartir por ${price}. ¿Te lo pongo?"

  # Upselling activo
  upsell:
    quantity: "¿Solo {qty}? Por ${extra_total} más te pongo {upsell_qty} y quedas mejor. ¿Le entramos?"
    upgrade: "Por solo ${upgrade_price} más la hacemos {upgrade_name}. ¡Queda espectacular! ¿Va?"

  # Confirmar cantidad personalizada
  custom_quantity:
    confirm: "¡Perfecto! {qty} {unit} de {product}, son ${total}. ¿Algo más?"

# ----------------------------------------------------------
# KEYWORDS PARA DETECTAR PREGUNTAS DE PORCIÓN
# ----------------------------------------------------------
portion_question_keywords:
  - "cuántos trae"
  - "cuántas trae"
  - "cuántos vienen"
  - "cuántas vienen"
  - "cuántos son"
  - "cuántas son"
  - "qué trae"
  - "qué incluye"
  - "viene con"
  - "trae la orden"
  - "piezas trae"
  - "piezas vienen"
