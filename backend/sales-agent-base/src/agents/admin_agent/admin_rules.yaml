# ==============================================================================
# ADMIN AGENT - Configuracion de Reglas e Intents
# ==============================================================================
# Configuracion para el clasificador de intents del Admin Agent.
# Soporta patrones regex, sinonimos y parametros por defecto.
# ==============================================================================

version: "1.0.0"
agent: "admin_agent"
language: "es"

# ==============================================================================
# CONFIGURACION GENERAL
# ==============================================================================
settings:
  confidence_threshold: 0.6
  require_confirmation_for:
    - create_promotion
    - toggle_product
    - update_product_price
    - toggle_promotion
  max_confirmation_attempts: 3
  confirmation_timeout_seconds: 60
  default_period: "today"
  cache_ttl_seconds: 60

# ==============================================================================
# DEFINICION DE INTENTS
# ==============================================================================
intents:

  # --------------------------------------------------------------------------
  # CONSULTAS DE VENTAS
  # --------------------------------------------------------------------------
  query_sales:
    description: "Consultar ventas y metricas de ventas"
    tool: "get_sales_report"
    priority: 1
    patterns:
      - "cuanto (vendimos|hemos vendido|llevamos)"
      - "ventas (de|del)? ?(hoy|ayer|semana|mes)"
      - "como (van|estan) las ventas"
      - "reporte de ventas"
      - "total de ventas"
      - "ingresos (del dia|de hoy|de ayer)"
    examples:
      - "Cuanto vendimos hoy?"
      - "Como van las ventas?"
      - "Ventas de ayer"
      - "Cuanto llevamos vendido esta semana?"
    extract_params:
      period:
        patterns:
          - pattern: "hoy|del dia|de hoy"
            value: "today"
          - pattern: "ayer"
            value: "yesterday"
          - pattern: "semana|semanal"
            value: "week"
          - pattern: "mes|mensual"
            value: "month"
        default: "today"

  query_orders:
    description: "Consultar cantidad de ordenes"
    tool: "get_orders_count"
    priority: 2
    patterns:
      - "cuantas ordenes"
      - "cuantos pedidos"
      - "ordenes (de|del)? ?(hoy|ayer|semana)"
      - "pedidos (pendientes|completados|del dia)"
    examples:
      - "Cuantas ordenes tenemos hoy?"
      - "Cuantos pedidos pendientes hay?"
      - "Ordenes completadas ayer"
    extract_params:
      period:
        patterns:
          - pattern: "hoy|del dia"
            value: "today"
          - pattern: "ayer"
            value: "yesterday"
          - pattern: "semana"
            value: "week"
        default: "today"
      status:
        patterns:
          - pattern: "pendientes?"
            value: "pending"
          - pattern: "completad[oa]s?"
            value: "completed"
          - pattern: "cancelad[oa]s?"
            value: "cancelled"
        default: null

  query_top_products:
    description: "Consultar productos mas vendidos"
    tool: "get_top_products"
    priority: 3
    patterns:
      - "(productos?|platillos?) mas vendidos?"
      - "que (se vende|vendemos) mas"
      - "top (productos?|ventas)"
      - "lo mas vendido"
      - "que (producto|platillo) es el estrella"
    examples:
      - "Cual es el producto mas vendido?"
      - "Que vendemos mas?"
      - "Top 5 productos"
      - "Lo mas vendido del dia"
    extract_params:
      limit:
        patterns:
          - pattern: "top (\\d+)"
            capture_group: 1
          - pattern: "(\\d+) (mas vendidos|mejores)"
            capture_group: 1
        default: 5
      period:
        patterns:
          - pattern: "hoy|del dia"
            value: "today"
          - pattern: "ayer"
            value: "yesterday"
          - pattern: "semana"
            value: "week"
          - pattern: "mes"
            value: "month"
        default: "today"

  query_hourly:
    description: "Consultar ventas por hora"
    tool: "get_hourly_sales"
    priority: 4
    patterns:
      - "hora pico"
      - "ventas por hora"
      - "a que hora vendemos mas"
      - "horario de mas ventas"
      - "cuando hay mas pedidos"
      - "horas de mayor venta"
    examples:
      - "Cual es la hora pico?"
      - "A que hora vendemos mas?"
      - "Ventas por hora de hoy"

  query_ticket:
    description: "Consultar ticket promedio"
    tool: "get_average_ticket"
    priority: 5
    patterns:
      - "ticket promedio"
      - "promedio (de|por) orden"
      - "cuanto gastan? (en promedio|los clientes)"
      - "valor promedio (del pedido|de la orden)"
    examples:
      - "Cual es el ticket promedio?"
      - "Cuanto gastan en promedio los clientes?"

  generate_report:
    description: "Generar reporte completo del dia"
    tool: "generate_daily_report"
    priority: 6
    patterns:
      - "reporte (del dia|diario|completo)"
      - "resumen (del dia|diario)"
      - "dame (el|un) reporte"
      - "como estuvo el dia"
      - "cierre del dia"
    examples:
      - "Dame el reporte del dia"
      - "Resumen diario"
      - "Como estuvo el dia?"

  # --------------------------------------------------------------------------
  # GESTION DE PROMOCIONES
  # --------------------------------------------------------------------------
  create_promotion:
    description: "Crear nueva promocion"
    tool: "create_promotion"
    priority: 7
    requires_confirmation: true
    patterns:
      - "crea(r)? (una )?promocion"
      - "nueva promocion"
      - "activa(r)? (un )?descuento"
      - "pon(er)? (un )?(2x1|descuento|promo)"
      - "quiero (hacer|crear) (una )?promocion"
    examples:
      - "Crea promocion 2x1 en hamburguesas"
      - "Activa 20% de descuento en pizzas"
      - "Nueva promocion: combo familiar $199"
    extract_params:
      promotion_type:
        patterns:
          - pattern: "2x1|dos por uno"
            value: "2x1"
          - pattern: "(\\d+)%|porcentaje"
            value: "percentage"
          - pattern: "\\$(\\d+) (de descuento|menos)"
            value: "fixed"
          - pattern: "combo"
            value: "combo"
        default: "percentage"
      discount_value:
        patterns:
          - pattern: "(\\d+)%"
            capture_group: 1
          - pattern: "\\$(\\d+)"
            capture_group: 1
        default: null
      products:
        patterns:
          - pattern: "en (las? )?(\\w+)"
            capture_group: 2
          - pattern: "para (las? )?(\\w+)"
            capture_group: 2
        default: []

  toggle_promotion:
    description: "Activar o desactivar promocion"
    tool: "toggle_promotion"
    priority: 8
    requires_confirmation: true
    patterns:
      - "(activa|desactiva|apaga|enciende)(r)? (la )?promocion"
      - "quita(r)? (la )?promocion"
      - "(cancela|termina)(r)? (la )?promocion"
    examples:
      - "Desactiva la promocion de tacos"
      - "Activa la promocion del 2x1"
    extract_params:
      active:
        patterns:
          - pattern: "activa|enciende"
            value: true
          - pattern: "desactiva|apaga|quita|cancela|termina"
            value: false
        default: true

  list_promotions:
    description: "Listar promociones activas"
    tool: "list_promotions"
    priority: 9
    patterns:
      - "que promociones (hay|tenemos|estan activas)"
      - "promociones activas"
      - "lista(r)? promociones"
      - "ver promociones"
      - "mostrar promociones"
    examples:
      - "Que promociones tenemos?"
      - "Promociones activas"

  # --------------------------------------------------------------------------
  # GESTION DE MENU
  # --------------------------------------------------------------------------
  toggle_product:
    description: "Marcar producto como disponible/agotado"
    tool: "toggle_product"
    priority: 10
    requires_confirmation: true
    patterns:
      - "se (acabo|termino|agoto) (el|la|los|las)? ?(\\w+)"
      - "(no hay|ya no tenemos) (\\w+)"
      - "(agotado|no disponible):? (\\w+)"
      - "(ya hay|llego|tenemos) (\\w+)"
      - "marca(r)? (\\w+) como (agotado|disponible)"
    examples:
      - "Se acabo la hamburguesa clasica"
      - "Ya no hay papas"
      - "Ya hay refrescos"
    extract_params:
      available:
        patterns:
          - pattern: "se (acabo|termino|agoto)|no hay|agotado|no disponible"
            value: false
          - pattern: "ya hay|llego|tenemos|disponible"
            value: true
        default: false

  update_price:
    description: "Actualizar precio de producto"
    tool: "update_product_price"
    priority: 11
    requires_confirmation: true
    patterns:
      - "cambia(r)? (el )?precio (de|del|de la)?"
      - "nuevo precio (para|de)"
      - "actualiza(r)? precio"
      - "sube(r)?|baja(r)? (el )?precio"
      - "pon(er)? (\\w+) a \\$(\\d+)"
    examples:
      - "Cambia el precio de hamburguesa a $89"
      - "Sube el precio de la pizza a $150"
    extract_params:
      new_price:
        patterns:
          - pattern: "\\$(\\d+(?:\\.\\d{2})?)"
            capture_group: 1
          - pattern: "a (\\d+(?:\\.\\d{2})?) pesos"
            capture_group: 1
        default: null

  list_unavailable:
    description: "Ver productos agotados"
    tool: "get_unavailable_products"
    priority: 12
    patterns:
      - "(productos?|platillos?) agotados?"
      - "que (no hay|esta agotado|no tenemos)"
      - "falta(n)? (productos?|ingredientes?)"
      - "lista de agotados"
    examples:
      - "Que productos estan agotados?"
      - "Que no hay?"

  # --------------------------------------------------------------------------
  # INTENTS ESPECIALES
  # --------------------------------------------------------------------------
  greeting:
    description: "Saludo del usuario"
    tool: null
    priority: 100
    patterns:
      - "^(hola|buenos dias|buenas tardes|buenas noches|hey|que tal)$"
      - "^(hola|buenos dias|buenas tardes|buenas noches),? ?(asistente|bot)?"
    examples:
      - "Hola"
      - "Buenos dias"

  help:
    description: "Solicitud de ayuda"
    tool: null
    priority: 101
    patterns:
      - "ayuda"
      - "que puedes hacer"
      - "como funciona"
      - "opciones"
      - "comandos"
      - "menu de opciones"
    examples:
      - "Ayuda"
      - "Que puedes hacer?"

  confirm:
    description: "Confirmacion de accion"
    tool: null
    priority: 102
    patterns:
      - "^(si|sip|ok|dale|confirmo|adelante|hazlo|correcto)$"
      - "^(si,? ?por favor|claro|afirmativo)$"
    examples:
      - "Si"
      - "Ok"
      - "Confirmo"

  cancel:
    description: "Cancelacion de accion"
    tool: null
    priority: 103
    patterns:
      - "^(no|nop|cancelar?|olvida(lo)?|dejalo|nada)$"
      - "no,? ?(gracias|mejor no)"
      - "cancela(r)? ?(eso|la operacion)?"
    examples:
      - "No"
      - "Cancelar"
      - "Olvidalo"

# ==============================================================================
# SINONIMOS Y ENTIDADES
# ==============================================================================
synonyms:
  periods:
    today: ["hoy", "del dia", "de hoy", "este dia"]
    yesterday: ["ayer", "dia anterior"]
    week: ["semana", "esta semana", "semanal", "7 dias"]
    month: ["mes", "este mes", "mensual", "30 dias"]

  products:
    hamburguesa: ["hamburguesa", "burger", "hamburguesas", "burgers"]
    pizza: ["pizza", "pizzas"]
    tacos: ["taco", "tacos"]
    papas: ["papas", "papas fritas", "french fries", "fries"]
    refresco: ["refresco", "refrescos", "soda", "bebida"]

  promotion_types:
    2x1: ["2x1", "dos por uno", "2 por 1"]
    percentage: ["porcentaje", "descuento porcentual", "%"]
    fixed: ["fijo", "descuento fijo", "pesos de descuento"]
    combo: ["combo", "paquete", "promocion combo"]

# ==============================================================================
# RESPUESTAS POR DEFECTO
# ==============================================================================
default_responses:
  unknown: "No entendi tu solicitud. Puedo ayudarte con ventas, promociones y menu. Di 'ayuda' para ver opciones."
  error: "Ocurrio un error procesando tu solicitud. Por favor intenta de nuevo."
  confirmation_timeout: "Se agoto el tiempo de espera para confirmar. La operacion fue cancelada."
  no_data: "No encontre datos para tu consulta. Intenta con otros parametros."

# ==============================================================================
# CONFIGURACION DE VOZ
# ==============================================================================
voice:
  enabled: true
  wake_words: ["oye asistente", "hey asistente", "asistente"]
  tts_voice: "es-MX-Standard-A"
  stt_language: "es-MX"
  silence_timeout_ms: 2000
  max_recording_seconds: 30
