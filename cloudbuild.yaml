# ================================================================================
# GOOGLE CLOUD BUILD - Build & Deploy to Cloud Run
# ================================================================================
# Este archivo automatiza el build y deployment a Cloud Run
# Uso: gcloud builds submit --config cloudbuild.yaml
# ================================================================================

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whatsapp-gateway:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whatsapp-gateway:latest'
      - '-f'
      - 'backend/whatsapp-gateway/Dockerfile'
      - 'backend/whatsapp-gateway'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/whatsapp-gateway:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/whatsapp-gateway:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whatsapp-gateway'
      - '--image'
      - 'gcr.io/$PROJECT_ID/whatsapp-gateway:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'ENVIRONMENT=production'

# Imágenes a guardar en Container Registry
images:
  - 'gcr.io/$PROJECT_ID/whatsapp-gateway:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/whatsapp-gateway:latest'

# Timeout del build (10 minutos)
timeout: 600s

# Opciones de build
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
