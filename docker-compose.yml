version: '3.8'

services:
  whatsapp-gateway:
    build: ./backend/whatsapp-gateway
    ports:
      - "8096:8000"
    environment:
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-twilio}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - WHATSAPP_ADMIN_NUMBERS=${WHATSAPP_ADMIN_NUMBERS:-+529999999999}
      - VOICE_ASSISTANT_URL=http://sales-agent-service:5000
      - SALES_AGENT_URL=http://sales-agent-service:5000
      - CUSTOMER_APP_URL=${CUSTOMER_APP_URL:-http://customer-app:80}
      - REDIS_URL=redis://restaurant_redis:6379/3
      - LLM_FIRST_MODE=${LLM_FIRST_MODE:-always}
      - USE_FSM_TEMPLATES=${USE_FSM_TEMPLATES:-false}
      - RECORD_ALL_CONVERSATIONS=${RECORD_ALL_CONVERSATIONS:-true}
    networks:
      - default
      - restaurant_network

  sales-agent-service:
    build: ./backend/sales-agent-base
    ports:
      - "5001:5000"
    environment:
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MENU_SERVICE_URL=http://api-service:5011
      - LLM_FIRST_MODE=${LLM_FIRST_MODE:-always}
      - USE_FSM_TEMPLATES=${USE_FSM_TEMPLATES:-false}
      - RECORD_ALL_CONVERSATIONS=${RECORD_ALL_CONVERSATIONS:-true}
      - FSM_CONFIDENCE_THRESHOLD=${FSM_CONFIDENCE_THRESHOLD:-0.85}
      - ALWAYS_LLM_INTENTS=${ALWAYS_LLM_INTENTS:-complex_recommendation,handle_objection,negotiate,complaint,special_request}
      - FSM_ELIGIBLE_INTENTS=${FSM_ELIGIBLE_INTENTS:-greeting,view_menu,view_category,add_to_order,confirm_order,goodbye}
      - LLM_PROVIDER=${LLM_PROVIDER:-cascade}
      - CASCADE_PREMIUM_INTENTS=${CASCADE_PREMIUM_INTENTS:-handle_objection,complex_recommendation,negotiate,complaint,special_request}

  api-service:
    build: ./backend/api-service-base
    ports:
      - "5021:5011"
    environment:
      - FIRESTORE_PROJECT=${GCP_PROJECT_ID}
      - DATABASE_URL=sqlite:////app/menu-service/menu_service.db
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - ENVIRONMENT=development
      - DEBUG=true

  admin-panel:
    build: ./frontend/admin-panel
    ports:
      - "8087:80"

  customer-app:
    build: ./frontend/customer-app
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: proyecto_b_whatsapp_saas_cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://whatsapp-gateway:8000
    depends_on:
      - whatsapp-gateway
    networks:
      - default

  cloudflare-tunnel-customer:
    image: cloudflare/cloudflared:latest
    container_name: proyecto_b_whatsapp_saas_cloudflare_tunnel_customer
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://customer-app:80
    depends_on:
      - customer-app
    networks:
      - default

volumes:
  api-data:

networks:
  default:
    driver: bridge
  restaurant_network:
    external: true
    name: restaurant_network
