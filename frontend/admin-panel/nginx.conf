# ================================================================================
# NGINX CONFIGURATION - Admin Panel (WhatsApp SaaS)
# ================================================================================
# Configuración optimizada para SPA Vue.js deployado en Firebase Hosting
# Backend services en Cloud Run (no se usan proxies aquí)
# ================================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================================================
    # COMPRESSION
    # ============================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ============================================================================
    # SECURITY HEADERS
    # ============================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================================
    # SPA ROUTING
    # ============================================================================
    # Redirect all routes to index.html for Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================================
    # CACHING STRATEGY
    # ============================================================================
    # Cache static assets aggressively (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files (ensure fresh SPA versions)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ============================================================================
    # HEALTH CHECK
    # ============================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================================================
    # SECURITY
    # ============================================================================
    # Disable access to hidden files (.git, .env, etc)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================================
    # ERROR PAGES
    # ============================================================================
    # Redirect all errors to index.html (SPA handles routing)
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}

