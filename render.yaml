services:
  - type: web
    name: whatsapp-gateway
    env: docker
    dockerfilePath: ./backend/whatsapp-gateway/Dockerfile
    dockerContext: ./backend/whatsapp-gateway
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: WHATSAPP_PROVIDER
        value: twilio
      - key: BASE_URL
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET_KEY
        generateValue: true
    autoDeploy: true
    buildCommand: ""
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port 8000"
