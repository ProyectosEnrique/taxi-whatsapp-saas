server {
    listen 80;
    server_name taxi.nexoai.lat;

    # Use Docker's embedded DNS so upstream IPs are re-resolved after rebuilds.
    # IMPORTANT: when proxy_pass uses a variable, nginx does NOT strip the
    # location prefix — the full $uri is forwarded. So we omit path from
    # proxy_pass and let FastAPI / the gateway handle their own prefixes.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API Service (datos: conductores, viajes, tarifas) ─────────────────
    location /api/v1/ {
        set $taxi_api http://taxi-api:5011;
        proxy_pass $taxi_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WhatsApp Gateway (webhooks Twilio/Meta) ───────────────────────────
    location /webhook/ {
        set $taxi_whatsapp http://taxi-whatsapp:8000;
        proxy_pass $taxi_whatsapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Sales Agent (conversación) — strips /agent/ prefix ───────────────
    location /agent/ {
        rewrite ^/agent/(.*)$ /$1 break;
        set $taxi_agent http://taxi-agent:5000;
        proxy_pass $taxi_agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Landing pages QR (perfil conductor + botón WhatsApp) ─────────────
    location /u/ {
        set $taxi_api_u http://taxi-api:5011;
        proxy_pass $taxi_api_u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Driver App (PWA conductores) ──────────────────────────────────────
    location /uploads/ {
        set $taxi_api_up http://taxi-api:5011;
        proxy_pass $taxi_api_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /driver/ {
        alias /usr/share/nginx/html/driver/;
        try_files $uri $uri/ /driver/index.html;
    }

    # ── Admin Panel ───────────────────────────────────────────────────────
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Redirect legacy /cliente URL (old WhatsApp messages) ─────────────
    # Absoluto y forzado a https: Traefik termina TLS y reenvía a nginx por
    # HTTP plano, así que un "return 302 /;" relativo se resuelve como
    # http://taxi.nexoai.lat/ (nginx usa $scheme de la conexión que ve, que
    # es http). Eso agrega un salto https→http→https que WebViews estrictos
    # (ej. navegador in-app de WhatsApp) pueden no seguir bien.
    location = /cliente {
        return 302 https://$host/;
    }

    # ── Taxi Customer App (PWA clientes) — raíz ───────────────────────────
    location / {
        root /usr/share/nginx/html/cliente;
        try_files $uri $uri/ /index.html;
    }
}
