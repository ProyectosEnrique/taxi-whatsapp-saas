server {
    listen 80;
    server_name taxi.nexoai.lat;

    # ── API Service (datos: conductores, viajes, tarifas) ─────────────────
    location /api/v1/ {
        proxy_pass http://taxi-api:5011/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WhatsApp Gateway (webhooks Twilio/Meta) ───────────────────────────
    location /webhook/ {
        proxy_pass http://taxi-whatsapp:8000/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Sales Agent (conversación) ────────────────────────────────────────
    location /agent/ {
        proxy_pass http://taxi-agent:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Landing pages QR (perfil conductor + botón WhatsApp) ─────────────
    location /u/ {
        proxy_pass http://taxi-api:5011/u/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Driver App (PWA conductores) ──────────────────────────────────────
    location /driver/ {
        alias /usr/share/nginx/html/driver/;
        try_files $uri $uri/ /driver/index.html;
    }

    # ── Admin Panel ───────────────────────────────────────────────────────
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Taxi Customer App (PWA clientes) — raíz ───────────────────────────
    location / {
        root /usr/share/nginx/html/cliente;
        try_files $uri $uri/ /index.html;
    }
}
